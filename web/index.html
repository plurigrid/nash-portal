<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <link data-trunk rel="rust"/>
    <title>NASH Portal</title>
    <style>
      body {
        margin: 0;
        background-color: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      pre {
        font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
        font-size: 14px;
        line-height: 1.1;
        margin: 0px;
      }
      .download-bar {
        width: 100%;
        background: #1a1a2e;
        padding: 8px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: #888;
        box-sizing: border-box;
        z-index: 10;
      }
      .download-bar a {
        color: #26d826;
        text-decoration: none;
        border: 1px solid #26d826;
        padding: 4px 12px;
        border-radius: 3px;
        transition: all 0.2s;
      }
      .download-bar a:hover {
        background: #26d826;
        color: #0a0a0a;
      }
      .download-bar .links {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .download-bar .links a.secondary {
        color: #888;
        border-color: #444;
      }
      .download-bar .links a.secondary:hover {
        color: #fff;
        border-color: #888;
        background: transparent;
      }
    </style>
</head>
<body>
    <div class="download-bar">
      <span>NASH Portal — $NASH on Solana via pump.fun</span>
      <div class="links">
        <a href="https://pump.fun/coin/4DQsMSkeKc3Mcij1BE4Z8oqU3QeV45QQ3Psn3CNDpump" class="secondary" target="_blank">pump.fun</a>
        <a href="https://dexscreener.com/solana/4DQsMSkeKc3Mcij1BE4Z8oqU3QeV45QQ3Psn3CNDpump" class="secondary" target="_blank">chart</a>
        <a href="https://github.com/plurigrid/nash-portal/releases/latest" target="_blank">Download TUI</a>
      </div>
    </div>
    <script type="module">
      window.addEventListener("TrunkApplicationStarted", (_) => {
        console.log("NASH Portal initialized");
      });
    </script>
</body>
</html>
